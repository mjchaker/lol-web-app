<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rift Recap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="topbar">
    <span class="brand">Rift<span class="brand-accent">Recap</span></span>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark / light mode" title="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
      </svg>
    </button>
  </header>

  <main class="container">
    <section class="hero" id="hero">
      <div class="icon-frame">
        <img id="summoner-icon" class="summoner-icon" src="" alt="Summoner profile icon">
        <span id="summoner-level" class="level-badge" hidden></span>
      </div>
      <h1 id="summoner-name" class="summoner-name">Loading…</h1>
      <p id="demo-note" class="demo-note" hidden>Demo mode — set <code>RIOT_API_KEY</code> to load live data</p>
    </section>

    <section class="matches">
      <h2 class="section-title">Recent Games</h2>
      <div id="match-list" class="match-list" role="list">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
      <p id="error-box" class="error-box" hidden></p>
    </section>
  </main>

  <footer class="footer">
    <p>RiftRecap isn't endorsed by Riot Games and doesn't reflect the views or opinions of Riot Games.</p>
  </footer>

  <audio id="bg-music" loop preload="auto"></audio>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
